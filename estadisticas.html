<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Estadísticas</title>

<link rel="stylesheet"
href="estadisticas.css">

</head>

<body>

<div class="stats-container">

    <!-- HEADER -->

    <div class="top">

        <h1>
            📊 Estadísticas de Aprendizaje
        </h1>

        <a href="loggin.html">

            <button>
                🏠 Volver
            </button>

        </a>

    </div>

    <!-- GRID -->

    <div class="stats-grid">

        <!-- CIRCULO -->

        <div class="card circle-card">

            <h2>
                Progreso General
            </h2>

            <div class="circle">

                <span id="porcentaje">
                    0%
                </span>

            </div>

        </div>

        <!-- MATERIAS -->

        <div class="card">

            <h2>
                📘 Rendimiento
            </h2>

            <div id="materiasStats">

            </div>

        </div>

    </div>

    <!-- RECOMENDACION -->

    <div class="card recomendacion">

        <h2>
            🤖 Recomendación IA
        </h2>

        <p id="iaTexto">

            Analizando estadísticas...

        </p>

    </div>

</div>

<script src="estadisticas.js"></script>

</body>
</html>
